<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique Hérisson</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1e1e1e;
  color: white;
  display: flex;
}

/* Zone personnage */
#character {
  width: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

#character img {
  width: 200px;
}

/* Boutique */
#shop {
  width: 50%;
  background: #2c2c2c;
  padding: 20px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab {
  padding: 10px;
  background: #444;
  cursor: pointer;
  border-radius: 5px;
}

.tab.active {
  background: #ff4c4c;
}

.items {
  display: none;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.items.active {
  display: grid;
}

.item {
  background: #555;
  padding: 10px;
  text-align: center;
  border-radius: 5px;
  cursor: pointer;
}

.item img {
  width: 60px;
}

</style>
</head>
<body>

<div id="character">
  <img id="hedgehog" src="https://i.imgur.com/8QfQZ6F.png" alt="herisson">
</div>

<div id="shop">
  <div class="tabs">
    <div class="tab active" onclick="openTab('skins')">Skins</div>
    <div class="tab" onclick="openTab('pants')">Pantalons</div>
    <div class="tab" onclick="openTab('accessories')">Accessoires</div>
  </div>

  <div id="skins" class="items active">
    <div class="item" onclick="changeSkin('https://i.imgur.com/8QfQZ6F.png')">Normal</div>
    <div class="item" onclick="changeSkin('https://i.imgur.com/YOUR_IMAGE.png')">Skin 1</div>
  </div>

  <div id="pants" class="items">
    <div class="item">Jean</div>
    <div class="item">Short</div>
  </div>

  <div id="accessories" class="items">
    <div class="item">Lunettes</div>
    <div class="item">Chapeau</div>
  </div>
</div>

<script>
function openTab(tabName) {
  document.querySelectorAll('.items').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

  document.getElementById(tabName).classList.add('active');
  event.target.classList.add('active');
}

function changeSkin(src) {
  document.getElementById('hedgehog').src = src;
}
</script>

</body>
</html>
